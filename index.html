<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J Code | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      /* 🚫 NO SCROLL */
      font-family: Arial, sans-serif;
    }

    /* ===== BACKGROUND ===== */
    body {
      background: linear-gradient(120deg, #1c1f26, #2a2f3a, #1c1f26);
      background-size: 300% 300%;
      animation: bgMove 25s ease infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* ===== NAVBAR ===== */
    nav {
      height: 60px;
      background: rgba(10, 10, 10, 0.95);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "Courier New", monospace;
      font-size: 20px;
      color: #00e0c6;
    }

    .logo::before {
      content: "◉";
      color: #00e0c6;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 16px;
    }

    nav li {
      cursor: pointer;
      font-size: 14px;
    }

    nav li.active {
      color: #00e0c6;
    }

    /* ===== MAIN VIEW ===== */
    main {
      height: calc(100% - 60px);
    }

    /* sections act like screens */
    .section {
      display: none;
      height: 100%;
      width: 100%;
      padding: 30px;
    }

    .section.active {
      display: flex;
    }

    /* ===== HOME ===== */
    #about {
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .home-text {
      max-width: 400px;
    }

    .home-text h1 {
      font-size: 32px;
    }

    .home-text p {
      margin-top: 10px;
      color: #ccc;
      line-height: 1.5;
    }

    /* Laptop */
    .laptop {
      width: 220px;
      height: 140px;
      border: 3px solid #00e0c6;
      border-radius: 10px;
      background: #0c0f14;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }

      100% {
        transform: translateY(0);
      }
    }

    .code {
      color: #00ffb3;
      font-family: monospace;
      font-size: 11px;
      text-align: center;
    }

    /* ===== SKILLS ===== */
    #skills {
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
    }

    .skill-bar {
      width: 260px;
      height: 36px;
      background: #222;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 20px;
    }

    .skill-fill {
      height: 100%;
      width: 0;
      background: #00e0c6;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      transition: width 4s ease;
      /* 🐢 slower */
    }

    /* ===== CONTACT ===== */
    #contact {
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      font-size: 24px;
      animation: contactFade 1.5s ease;
    }

    @keyframes contactFade {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      #about {
        flex-direction: column;
        text-align: center;
      }

      nav ul {
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">J Code</div>
    <ul>
      <li onclick="showSection('about')" class="active" id="nav-about">Home</li>
      <li onclick="showSection('skills')" id="nav-skills">Skills</li>
      <li onclick="showSection('contact')" id="nav-contact">Contact</li>
    </ul>
  </nav>

  <main>
    <!-- HOME -->
    <section id="about" class="section active">
      <div class="home-text">
        <h1>Hi, I’m Jomiloju 👋</h1>
        <p>
          I build clean, responsive websites using HTML, CSS and JavaScript.
          Trained at Digital World Tech.
        </p>
      </div>

      <div class="laptop">
        <div class="code" id="typing"></div>
      </div>
    </section>

    <!-- SKILLS -->
    <section id="skills" class="section">
      <h1>Skills</h1>
      <div class="skill-bar">
        <div class="skill-fill" id="skillFill">HTML</div>
      </div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section">
      <div>
        <p>📧 Adegunjujomiloju@gmail.com</p>
        <p>📞 +234 812 223 0196</p>
      </div>
    </section>
  </main>

  <script>
    /* section switching */
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav li').forEach(n => n.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('nav-' + id).classList.add('active');

      if (id === 'skills') animateSkills();
    }

    /* typing effect */
    const text = "Adegunjujomiloju@gmail.com | +2348122230196";
    let i = 0;
    const typing = document.getElementById("typing");

    function typeText() {
      if (i <= text.length) {
        typing.textContent = text.slice(0, i) + "|";
        i++;
        setTimeout(typeText, 90);
      } else {
        i = 0;
        setTimeout(typeText, 1200);
      }
    }
    typeText();

    /* skills animation */
    const skills = ["HTML", "CSS", "JavaScript", "Git & GitHub"];
    let s = 0;
    const fill = document.getElementById("skillFill");

    function animateSkills() {
      s = 0;
      nextSkill();
    }

    function nextSkill() {
      if (s < skills.length) {
        fill.textContent = skills[s];
        fill.style.width = "0";
        setTimeout(() => fill.style.width = "100%", 200);
        s++;
        setTimeout(nextSkill, 4500);
      }
    }
  </script>

</body>

</html>
